name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ARCHIVE="frg-${TAG}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" frg
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "v${{ env.VERSION }}" \
              --repo qhkm/fastripgrep \
              --pattern "frg-v${{ env.VERSION }}-${target}.tar.gz"
          done

      - name: Compute checksums
        run: |
          echo "SHA_AARCH64_DARWIN=$(sha256sum frg-v${{ env.VERSION }}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_X86_64_DARWIN=$(sha256sum frg-v${{ env.VERSION }}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_AARCH64_LINUX=$(sha256sum frg-v${{ env.VERSION }}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_X86_64_LINUX=$(sha256sum frg-v${{ env.VERSION }}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: qhkm/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/frg.rb << 'FORMULA'
          class Frg < Formula
            desc "Fast regex search with sparse n-gram indexing — faster than ripgrep"
            homepage "https://github.com/qhkm/fastripgrep"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/qhkm/fastripgrep/releases/download/v#{version}/frg-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_DARWIN_PLACEHOLDER"
              else
                url "https://github.com/qhkm/fastripgrep/releases/download/v#{version}/frg-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_DARWIN_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/qhkm/fastripgrep/releases/download/v#{version}/frg-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_LINUX_PLACEHOLDER"
              else
                url "https://github.com/qhkm/fastripgrep/releases/download/v#{version}/frg-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_LINUX_PLACEHOLDER"
              end
            end

            def install
              bin.install "frg"
            end

            test do
              assert_match "frg", shell_output("#{bin}/frg --version")
            end
          end
          FORMULA

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${{ env.VERSION }}/g" homebrew-tap/Formula/frg.rb
          sed -i "s/SHA_AARCH64_DARWIN_PLACEHOLDER/${{ env.SHA_AARCH64_DARWIN }}/g" homebrew-tap/Formula/frg.rb
          sed -i "s/SHA_X86_64_DARWIN_PLACEHOLDER/${{ env.SHA_X86_64_DARWIN }}/g" homebrew-tap/Formula/frg.rb
          sed -i "s/SHA_AARCH64_LINUX_PLACEHOLDER/${{ env.SHA_AARCH64_LINUX }}/g" homebrew-tap/Formula/frg.rb
          sed -i "s/SHA_X86_64_LINUX_PLACEHOLDER/${{ env.SHA_X86_64_LINUX }}/g" homebrew-tap/Formula/frg.rb

          # Fix indentation (heredoc adds extra spaces)
          sed -i 's/^          //' homebrew-tap/Formula/frg.rb

      - name: Push to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/frg.rb
          git commit -m "Update frg to ${{ env.VERSION }}"
          git push
